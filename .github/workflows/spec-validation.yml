name: spec-validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: [self-hosted,Linux]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate spec
        run: bash spec/scripts/validate-spec.sh

      - uses: actions/setup-go@v5
        with:
          go-version-file: softprobe-cli/go.mod

      - name: Validate docs snippets suite
        run: |
          cd softprobe-cli
          go build -o /tmp/softprobe ./cmd/softprobe
          /tmp/softprobe validate suite ../docs/snippets.suite.yaml
