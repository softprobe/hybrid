# PD5.4b — publish softprobe Python SDK to PyPI on v* tags.
# TestPyPI is checked first; real PyPI publish follows on success.
name: softprobe-python PyPI publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install hatchling build twine

      - name: Align version with release tag
        working-directory: softprobe-python
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml

      - name: Build
        working-directory: softprobe-python
        run: python -m build

      - name: Publish to TestPyPI
        working-directory: softprobe-python
        run: twine upload --repository testpypi dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_TOKEN }}

      - name: Publish to PyPI
        working-directory: softprobe-python
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
