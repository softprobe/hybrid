name: softprobe CLI release

on:
  push:
    tags:
      - "v*"

env:
  GCS_BUCKET: softprobe-published-files
  GCS_PREFIX: cli/softprobe

jobs:
  # Build each target and upload directly to GCS.  CGO_ENABLED=0 + GOOS/GOARCH
  # cross-compiles all targets from the Linux runner — no macOS runner needed.
  build-and-upload:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: [self-hosted, Linux]
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: softprobe-runtime/go.mod
          cache-dependency-path: softprobe-runtime/go.sum

      - name: Build
        working-directory: softprobe-runtime
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          echo "$VERSION" > ../.tag
          go build -trimpath \
            -ldflags "-s -w -X softprobe-runtime/internal/version.Version=${VERSION}" \
            -o "../dist/softprobe-${{ matrix.goos }}-${{ matrix.goarch }}" \
            ./cmd/softprobe

      - name: Authenticate to GCS
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCS_SERVICE_ACCOUNT_KEY }}

      - name: Upload version file
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: .tag
          destination: ${{ env.GCS_BUCKET }}/${{ env.GCS_PREFIX }}
          headers: |-
            content-type: text/plain

      - name: Upload to GCS
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: dist/softprobe-${{ matrix.goos }}-${{ matrix.goarch }}
          destination: ${{ env.GCS_BUCKET }}/${{ env.GCS_PREFIX }}/${{ github.ref_name }}
          headers: |-
            content-type: application/octet-stream
            content-disposition: attachment

      - name: Smoke
        run: |
          URL="https://storage.googleapis.com/${{ env.GCS_BUCKET }}/${{ env.GCS_PREFIX }}/${{ github.ref_name }}/softprobe-${{ matrix.goos }}-${{ matrix.goarch }}"
          curl -sfI "$URL" | grep -i "content-type"
          echo "GCS URL: $URL"
