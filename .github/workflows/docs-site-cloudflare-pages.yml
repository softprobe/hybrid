# Build VitePress and upload the static output to Cloudflare Pages (Direct Upload).
name: docs-site — Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs-site/**"
      - ".github/workflows/docs-site-cloudflare-pages.yml"
  workflow_dispatch:

concurrency:
  group: docs-site-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted,Linux]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install and build
        working-directory: docs-site
        run: npm ci && npm run docs:build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs-site/.vitepress/dist --project-name=still-fog-a0b3
