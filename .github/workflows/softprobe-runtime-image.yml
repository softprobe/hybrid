# PD5.3a — build the unified runtime + CLI image; push to GHCR on main and v* tags.
name: softprobe-runtime image

on:
  pull_request:
    paths:
      - "softprobe-runtime/**"
      - ".github/workflows/softprobe-runtime-image.yml"
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/softprobe-runtime

jobs:
  docker:
    runs-on: [self-hosted,Linux]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---- PR: build + load + smoke only (no registry write) ----
      - name: Build (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./softprobe-runtime
          file: ./softprobe-runtime/Dockerfile
          push: false
          load: true
          tags: softprobe-runtime:ci
          build-args: |
            VERSION=0.0.0-dev

      - name: Smoke PR image (--version)
        if: github.event_name == 'pull_request'
        run: docker run --rm softprobe-runtime:ci --version

      # ---- main / tag: login, build, push, smoke published ref ----
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag

      - name: Build and push
        if: github.event_name != 'pull_request'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./softprobe-runtime
          file: ./softprobe-runtime/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '0.0.0-dev' }}

      - name: Smoke pushed image (main → latest)
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest --version

      - name: Smoke pushed image (release tag)
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
        run: docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} --version
