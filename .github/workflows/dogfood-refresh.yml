name: Dogfood Case Refresh

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC nightly
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: softprobe-runtime/go.mod

      - name: Build WASM (required for e2e compose)
        run: |
          cd softprobe-proxy
          rustup target add wasm32-unknown-unknown
          make build

      - name: Start e2e compose
        run: |
          docker compose -f e2e/docker-compose.yaml up --build --wait --timeout 120

      - name: Run capture-refresh
        id: refresh
        run: |
          make capture-refresh
          if git diff --quiet -- spec/examples/cases/control-plane-v1.case.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop e2e compose
        if: always()
        run: docker compose -f e2e/docker-compose.yaml down

      - name: Open PR if case changed
        if: steps.refresh.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="dogfood/refresh-$(date +%Y%m%d-%H%M%S)"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add spec/examples/cases/control-plane-v1.case.json
          git commit -m "chore(dogfood): refresh control-plane-v1 case"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore(dogfood): refresh control-plane-v1 case" \
            --body "Automated dogfood case refresh. Review the diff carefully — a change here indicates the control-plane HTTP surface changed. Do **not** merge if runtime or SDK code is also changing in the same branch." \
            --head "$BRANCH" \
            --base main \
            --label "dogfood"
