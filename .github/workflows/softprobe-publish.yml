# PD5.4 -- unified publish workflow.
#
# Fires on annotated semver tags: v*.*.*
# All components are published atomically in parallel.
# On failure of any component the GitHub Release is NOT created so that
# re-tagging (or re-running) can retry without partial publishes.
#
# Components & destinations:
#   softprobe-js       -> npm (@softprobe/softprobe-js)
#   softprobe-python   -> PyPI
#   softprobe-java     -> Maven Central
#   softprobe-go       -> tag submodule -> pkg.go.dev (Go module proxy)
#   softprobe-runtime  -> GHCR (ghcr.io/softprobe/softprobe-runtime)
#   softprobe-proxy    -> GCS (WASM binary only, no Docker)
#   CLI binaries       -> GCS (linux/mac x amd64/arm64)
#   agent-skills       -> GCS (skill package + manifest + version)
#
name: softprobe publish

on:
  create:
    ref_type: tag
  workflow_dispatch:

env:
  GCS_BUCKET: softprobe-published-files
  VERSION: ${{ github.ref_name }}

# Prevent concurrent publishes of the same tag; cancel older runs if a tag
# is re-pushed.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

permissions:
  contents: write   # needed for release notes and GHA release
  packages: write   # GHCR
  id-token: write   # GCS OIDC

jobs:
  # -- Validate ----------------------------------------------------------------

  validate:
    name: Validate version ${{ github.ref_name }}
    runs-on: [self-hosted, Linux]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Debug context
        run: |
          echo "github.ref=${{ github.ref }}"
          echo "github.ref_name=${{ github.ref_name }}"
          echo "github.event_name=${{ github.event_name }}"
          echo "github.sha=${{ github.sha }}"
      - name: Validate semver
        run: |
          TAG="${{ github.ref_name }}"
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: ref_name '$TAG' is not a valid semver tag (v*.*.*)"
            exit 1
          fi
          echo "[OK] $TAG is a valid semver tag"

  # -- JavaScript SDK ----------------------------------------------------------

  js-sdk:
    name: JS SDK -> npm
    needs: validate
    runs-on: [self-hosted, Linux]
    # id-token required for npm OIDC trusted publishing (self-hosted: unset tokens)
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: "npm"
          cache-dependency-path: softprobe-js/package-lock.json
      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@11.5.1
      - name: Inject version
        run: |
          VERSION="${{ github.ref_name }}"
          python -c "
          import json, pathlib
          p = pathlib.Path('softprobe-js/package.json')
          d = json.loads(p.read_text())
          d['version'] = '$VERSION'
          p.write_text(json.dumps(d, indent=2) + '\n')
          print('version set to', d['version'])
          "
      - name: Install + build
        run: cd softprobe-js && npm ci && npm run build
      - name: Dry-run package
        run: cd softprobe-js && npm pack --dry-run
      - name: Publish to npm (OIDC)
        run: |
          cd softprobe-js
          unset NODE_AUTH_TOKEN
          unset NPM_TOKEN
          npm publish --access public --registry=https://registry.npmjs.org --no-provenance
      - name: Print workflow identity
        run: |
          echo "repository=${{ github.repository }}"
          echo "ref=${{ github.ref }}"
          node -v
          npm -v

  # -- Python SDK -------------------------------------------------------------

  python-sdk:
    name: Python SDK -> PyPI
    needs: validate
    runs-on: [self-hosted, Linux]
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Inject version
        working-directory: softprobe-python
        run: |
          VERSION="${{ github.ref_name }}"
          python -c "
          import re, pathlib
          p = pathlib.Path('pyproject.toml')
          text = p.read_text()
          text = re.sub(r'^version = \"[^\"]*\"', f'version = \"{VERSION}\"', text, flags=re.MULTILINE)
          p.write_text(text)
          "
      - name: Install build tools
        working-directory: softprobe-python
        run: pip install build twine
      - name: Build
        working-directory: softprobe-python
        run: python -m build
      - name: Publish to TestPyPI
        working-directory: softprobe-python
        run: twine upload --repository testpypi dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_TOKEN }}
      - name: Publish to PyPI
        working-directory: softprobe-python
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  # -- Java SDK ----------------------------------------------------------------

  java-sdk:
    name: Java SDK -> Maven Central
    needs: validate
    runs-on: [self-hosted, Linux]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      - name: Inject version (strip v prefix for Maven)
        working-directory: softprobe-java
        run: |
          mvn versions:set -DnewVersion="${{ github.ref_name }}" -DgenerateBackupPoms=false
      - name: Publish to Maven Central
        working-directory: softprobe-java
        run: mvn --no-transfer-progress -P release deploy -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

  # -- Go SDK -----------------------------------------------------------------

  go-sdk:
    name: Go SDK -> pkg.go.dev
    needs: validate
    runs-on: [self-hosted, Linux]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Update softprobe-go to latest main
        run: |
          cd softprobe-go
          git fetch origin main
          git checkout main
          echo "[OK] softprobe-go at $(git log --oneline -1 origin/main)"
      - name: Tag and push softprobe-go
        run: |
          cd softprobe-go
          git config user.email "ci@softprobe.dev"
          git config user.name "Softprobe CI"
          git tag -a "${{ github.ref_name }}" -m "Release ${{ github.ref_name }}"
          git push origin "${{ github.ref_name }}"
          echo "[OK] softprobe-go tagged at ${{ github.ref_name }}"
      - name: Verify module is accessible
        run: |
          sleep 5
          curl -sf "https://proxy.golang.org/github.com/softprobe/softprobe-go/@v/${{ github.ref_name }}.mod" | head -1
          echo "[OK] Go module published"

  # -- Runtime Docker image ----------------------------------------------------

  runtime-image:
    name: Runtime -> GHCR
    needs: validate
    runs-on: [self-hosted, Linux]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/softprobe-runtime
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./softprobe-runtime
          file: ./softprobe-runtime/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
      - name: Smoke pushed image (main -> latest)
        if: github.ref == 'refs/heads/main'
        run: docker run --rm ghcr.io/${{ github.repository_owner }}/softprobe-runtime:latest --version
      - name: Smoke pushed image (release tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: docker run --rm ghcr.io/${{ github.repository_owner }}/softprobe-runtime:${{ github.ref_name }} --version

  # -- Proxy WASM -> GCS -------------------------------------------------------

  proxy-wasm:
    name: Proxy WASM -> GCS
    needs: validate
    runs-on: [self-hosted, Linux]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            softprobe-proxy/target
          key: ${{ runner.os }}-wasm-${{ hashFiles('softprobe-proxy/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-wasm-
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler file
      - name: Build WASM
        working-directory: softprobe-proxy
        run: |
          make check-deps-build
          make build
      - name: WASM SHA256
        id: wasmhash
        working-directory: softprobe-proxy
        run: |
          echo "sha=$(cat target/wasm32-unknown-unknown/release/sp_istio_agent.wasm.sha256)" >> "$GITHUB_OUTPUT"
      - name: Authenticate to GCS
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCS_SERVICE_ACCOUNT_KEY }}
      - name: Upload WASM to GCS
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: softprobe-proxy/target/wasm32-unknown-unknown/release/sp_istio_agent.wasm
          destination: softprobe-published-files/agent/proxy-wasm/${{ github.ref_name }}
          headers: |-
            content-type: application/wasm
      - name: Upload SHA256 to GCS
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: softprobe-proxy/target/wasm32-unknown-unknown/release/sp_istio_agent.wasm.sha256
          destination: softprobe-published-files/agent/proxy-wasm/${{ github.ref_name }}
          headers: |-
            content-type: text/plain
      - name: Write version file
        run: |
          echo "${{ github.ref_name }}" > version
      - name: Upload version to GCS
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: version
          destination: softprobe-published-files/agent/proxy-wasm
          headers: |-
            content-type: text/plain
      - name: Smoke GCS URL
        run: |
          URL="https://storage.googleapis.com/softprobe-published-files/agent/proxy-wasm/${{ github.ref_name }}/sp_istio_agent.wasm"
          curl -sfI "$URL" | grep -i "content-type: application/wasm"
          echo "GCS WASM URL: $URL"

  # -- CLI binaries -> GCS -----------------------------------------------------

  cli:
    name: CLI -> GCS
    needs: validate
    runs-on: [self-hosted, Linux]
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: softprobe-runtime/go.mod
          cache-dependency-path: softprobe-runtime/go.sum
      - name: Build
        working-directory: softprobe-runtime
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          echo "${{ github.ref_name }}" > ../version
          go build -trimpath \
            -ldflags "-s -w -X softprobe-runtime/internal/version.Version=${{ github.ref_name }}" \
            -o "../dist/softprobe-${{ matrix.goos }}-${{ matrix.goarch }}" \
            ./cmd/softprobe
      - name: Authenticate to GCS
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCS_SERVICE_ACCOUNT_KEY }}
      - name: Upload version file
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: version
          destination: softprobe-published-files/cli/softprobe
          headers: |-
            content-type: text/plain
      - name: Upload to GCS
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: dist/softprobe-${{ matrix.goos }}-${{ matrix.goarch }}
          destination: softprobe-published-files/cli/softprobe/${{ github.ref_name }}
          headers: |-
            content-type: application/octet-stream
            content-disposition: attachment
      - name: Smoke
        run: |
          URL="https://storage.googleapis.com/softprobe-published-files/cli/softprobe/${{ github.ref_name }}/softprobe-${{ matrix.goos }}-${{ matrix.goarch }}"
          curl -sfI "$URL" | grep -i "content-type"
          echo "GCS URL: $URL"

  # -- Agent skills -> GCS ------------------------------------------------------

  agent-skills:
    name: Agent Skills -> GCS
    needs: validate
    runs-on: [self-hosted, Linux]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Validate ai-context.md (local)
        run: python3 scripts/validate-ai-context.py
      - name: Verify production ai-context.md
        run: |
          URL="https://docs.softprobe.dev/ai-context.md"
          for i in $(seq 1 18); do
            if curl -sf "$URL" | grep -q "Last updated:"; then
              echo "OK: $URL"
              exit 0
            fi
            echo "attempt $i: waiting for docs host..."
            sleep 10
          done
          echo "error: $URL unreachable or invalid; deploy docs first" >&2
          exit 1
      - name: Package skill
        run: |
          python3 scripts/package-agent-skill.py softprobe-test-writer \
            --version "${{ github.ref_name }}"
      - name: Authenticate to GCS
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCS_SERVICE_ACCOUNT_KEY }}
      - name: Upload expanded skill to GCS
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: dist/agent-skills/softprobe-test-writer
          destination: softprobe-published-files/agent/skills/${{ github.ref_name }}
      - name: Upload skill archive to GCS
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: dist/softprobe-test-writer.zip
          destination: softprobe-published-files/agent/skills/${{ github.ref_name }}
          headers: |-
            content-type: application/zip
            content-disposition: attachment
      - name: Upload manifest to GCS
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: dist/manifest.json
          destination: softprobe-published-files/agent/skills/${{ github.ref_name }}
          headers: |-
            content-type: application/json
      - name: Upload version to GCS
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: dist/version
          destination: softprobe-published-files/agent/skills/softprobe-test-writer
          headers: |-
            content-type: text/plain
      - name: Smoke GCS URLs
        run: |
          BASE="https://storage.googleapis.com/softprobe-published-files/agent/skills/${{ github.ref_name }}"
          curl -sfI "$BASE/softprobe-test-writer.zip" | grep -i "content-type: application/zip"
          curl -sf "$BASE/softprobe-test-writer/SKILL.md" | grep "name: softprobe-test-writer"
          echo "GCS skill URL: $BASE/softprobe-test-writer.zip"

  # -- GitHub Release ---------------------------------------------------------

  release:
    name: Create GitHub Release
    needs: [js-sdk, python-sdk, java-sdk, go-sdk, runtime-image, proxy-wasm, cli, agent-skills]
    runs-on: [self-hosted, Linux]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate release notes
        env:
          VERSION: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Collect all GCS download URLs
          CLI_URLS=""
          for PLATFORM in linux darwin; do
            for ARCH in amd64 arm64; do
              URL="https://storage.googleapis.com/softprobe-published-files/cli/softprobe/${VERSION}/softprobe-${PLATFORM}-${ARCH}"
              CLI_URLS="${CLI_URLS}\n  - \`softprobe-${PLATFORM}-${ARCH}\`: ${URL}"
            done
          done

          WASM_URL="https://storage.googleapis.com/softprobe-published-files/agent/proxy-wasm/${VERSION}/sp_istio_agent.wasm"
          WASM_SHA256_URL="https://storage.googleapis.com/softprobe-published-files/agent/proxy-wasm/${VERSION}/sp_istio_agent.wasm.sha256"

          SKILL_URL="https://storage.googleapis.com/softprobe-published-files/agent/skills/${VERSION}/softprobe-test-writer.zip"

          cat > release_notes.md << EOF
          # Softprobe $VERSION

          ## Downloads

          ### CLI
          ${CLI_URLS}
          Run: \`curl -sfL https://storage.googleapis.com/softprobe-published-files/cli/softprobe/${VERSION}/softprobe-linux-amd64 | bash\`

          ### Container Images
          - \`ghcr.io/${{ github.repository_owner }}/softprobe-runtime:${VERSION}\`
          - \`ghcr.io/${{ github.repository_owner }}/softprobe-runtime:latest\`

          ### Proxy WASM
          - Binary: ${WASM_URL}
          - SHA256: ${WASM_SHA256_URL}

          ### SDKs
          - **JS**: \`npm install @softprobe/softprobe-js@${VERSION}\`
          - **Python**: \`pip install softprobe==${VERSION}\`
          - **Java**: Maven Central (\`com.softprobe:softprobe-java:${VERSION}\`)
          - **Go**: \`go get github.com/softprobe/softprobe-go@${VERSION}\`

          ### Agent Skills
          - **softprobe-test-writer**: ${SKILL_URL}
          EOF
          echo "release_notes.md:"
          cat release_notes.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Softprobe ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: false