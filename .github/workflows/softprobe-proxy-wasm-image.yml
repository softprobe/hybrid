# Build sp_istio_agent.wasm and publish to two destinations:
#   GHCR (FROM scratch OCI image, for Istio WasmPlugin oci:// URL)
#   GCS  (plain binary at gs://softprobe-published-files/agent/proxy-wasm/<tag>/,
#          for Envoy code.remote HTTP fetch in Docker Compose)
name: softprobe-proxy wasm

on:
  pull_request:
    paths:
      - "softprobe-proxy/**"
      - ".github/workflows/softprobe-proxy-wasm-image.yml"
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE: ${{ github.repository_owner }}/softprobe-proxy
  GCS_BUCKET: softprobe-published-files
  GCS_PREFIX: agent/proxy-wasm

jobs:
  wasm-image:
    runs-on: [self-hosted,Linux]
    permissions:
      contents: read
      packages: write
      id-token: write   # for Workload Identity GCS auth

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            softprobe-proxy/target
          key: ${{ runner.os }}-wasm-${{ hashFiles('softprobe-proxy/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-wasm-

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler file

      - name: Build WASM
        working-directory: softprobe-proxy
        run: |
          make check-deps-build
          make build

      - name: WASM SHA256 (OCI label + GCS upload)
        id: wasmhash
        working-directory: softprobe-proxy
        run: |
          echo "sha=$(cat target/wasm32-unknown-unknown/release/sp_istio_agent.wasm.sha256)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Smoke PR image (crane export — wasm at /plugin.wasm)
        if: github.event_name == 'pull_request'
        run: |
          crane export softprobe-proxy-wasm:ci | tar -xO plugin.wasm > /tmp/plugin.wasm
          test -s /tmp/plugin.wasm
          file /tmp/plugin.wasm | grep -i wasm

      - name: Resolve tag
        if: github.event_name != 'pull_request'
        id: gcstag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to GCS
        if: github.event_name != 'pull_request'
        id: gcsauth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCS_SERVICE_ACCOUNT_KEY }}

      - name: Upload WASM to GCS
        if: github.event_name != 'pull_request'
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: softprobe-proxy/target/wasm32-unknown-unknown/release/sp_istio_agent.wasm
          destination: ${{ env.GCS_BUCKET }}/${{ env.GCS_PREFIX }}/${{ steps.gcstag.outputs.tag }}
          headers: |-
            content-type: application/wasm

      - name: Upload SHA256 to GCS
        if: github.event_name != 'pull_request'
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: softprobe-proxy/target/wasm32-unknown-unknown/release/sp_istio_agent.wasm.sha256
          destination: ${{ env.GCS_BUCKET }}/${{ env.GCS_PREFIX }}/${{ steps.gcstag.outputs.tag }}
          headers: |-
            content-type: text/plain

      - name: Write version file
        run: |
          echo "${{ steps.gcstag.outputs.tag }}" > version

      - name: Upload version to GCS
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: version
          destination: ${{ env.GCS_BUCKET }}/${{ env.GCS_PREFIX }}
          headers: |-
            content-type: text/plain

      - name: Smoke GCS URL
        if: github.event_name != 'pull_request'
        run: |
          T=${{ steps.gcstag.outputs.tag }}
          URL="https://storage.googleapis.com/${{ env.GCS_BUCKET }}/${{ env.GCS_PREFIX }}/${T}/sp_istio_agent.wasm"
          curl -sfI "$URL" | grep -i "content-type: application/wasm"
          echo "GCS WASM URL: $URL"
