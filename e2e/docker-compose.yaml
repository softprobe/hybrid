services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 20

  authstub:
    image: golang:1.25-alpine
    working_dir: /workspace/e2e/authstub
    command: ["sh", "-c", "go run ."]
    volumes:
      - ..:/workspace
    ports:
      - "8091:8091"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8091/health"]
      interval: 5s
      timeout: 2s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s

  softprobe-runtime:
    build:
      context: ../softprobe-runtime
      dockerfile: Dockerfile
    mem_limit: 2g
    environment:
      CONFIG_FILE: /workspace/e2e/softprobe-runtime.yaml
      SOFTPROBE_LISTEN_ADDR: 0.0.0.0:8080
      SOFTPROBE_CAPTURE_CASE_PATH: /workspace/e2e/captured.case.json
      SOFTPROBE_AUTH_URL: http://authstub:8091/validate
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      SOFTPROBE_GRPC_DISABLE: "1"
      AWS_REGION: us-east-1
    volumes:
      - ..:/workspace
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    depends_on:
      redis:
        condition: service_healthy
      authstub:
        condition: service_healthy
      lakekeeper-init:
        condition: service_completed_successfully

  softprobe-proxy:
    image: envoyproxy/envoy:v1.27-latest
    command: ["/usr/local/bin/envoy", "-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml
      - ../softprobe-proxy/target/wasm32-unknown-unknown/release/sp_istio_agent.wasm:/etc/envoy/sp_istio_agent.wasm
    ports:
      - "8082:8082"
      - "8084:8084"
      - "18001:18001"
    healthcheck:
      test: ["CMD", "sh", "-c", "true"]
      interval: 5s
      timeout: 2s
      retries: 20

  upstream:
    image: golang:1.25-alpine
    working_dir: /workspace/e2e/upstream
    command: ["sh", "-c", "go run ."]
    volumes:
      - ..:/workspace
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8083/health"]
      interval: 5s
      timeout: 2s
      retries: 20

  app:
    image: golang:1.25-alpine
    working_dir: /workspace/e2e/app
    command: ["sh", "-c", "go run ."]
    volumes:
      - ..:/workspace
    environment:
      EGRESS_PROXY_URL: http://softprobe-proxy:8084
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/health"]
      interval: 5s
      timeout: 2s
      retries: 20
    depends_on:
      softprobe-proxy:
        condition: service_healthy
      upstream:
        condition: service_healthy

  test-runner:
    image: golang:1.25-alpine
    working_dir: /workspace/e2e/test-runner
    command: ["sh", "-c", "go run . && touch /tmp/e2e-ok && sleep infinity"]
    volumes:
      - ..:/workspace
    environment:
      RUNTIME_URL: http://softprobe-runtime:8080
      PROXY_URL: http://softprobe-proxy:8082
      APP_URL: http://app:8081
      UPSTREAM_URL: http://upstream:8083
      SOFTPROBE_API_KEY: dev-public-key
    depends_on:
      softprobe-runtime:
        condition: service_healthy
      softprobe-proxy:
        condition: service_healthy
      app:
        condition: service_healthy
      upstream:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/e2e-ok"]
      interval: 5s
      timeout: 2s
      retries: 20

volumes:
  minio-data:
  lakekeeper-postgres:
