apiVersion: apps/v1
kind: Deployment
metadata:
  name: softprobe-runtime
  labels:
    app.kubernetes.io/name: softprobe-runtime
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: softprobe-runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: softprobe-runtime
    spec:
      containers:
        - name: softprobe-runtime
          image: softprobe-runtime:latest
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: softprobe-runtime
  labels:
    app.kubernetes.io/name: softprobe-runtime
spec:
  selector:
    app.kubernetes.io/name: softprobe-runtime
  ports:
    - name: http
      port: 8080
      targetPort: http
